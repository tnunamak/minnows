name: data-packs
on:
  push:
    paths:
      - 'data/**'
      - 'scripts/validate_data_pack.py'
      - 'scripts/check_freshness.py'
      - '.github/workflows/data-packs.yml'
  pull_request:
    paths:
      - 'data/**'
      - 'scripts/**'
  workflow_dispatch:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate data packs
        run: python3 scripts/validate_data_pack.py
      - name: Freshness (load-bearing)
        run: python3 scripts/check_freshness.py --max-age-days 45 --fail
