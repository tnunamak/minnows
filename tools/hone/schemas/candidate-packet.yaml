# hone candidate packet — the durable unit of work (v1.1, 2026-07-01)
# v1.1 incorporates the 11 amendments from the schema reality-validation (5 hand-authored packets,
# 1 executed end-to-end; packet-alone sufficiency measured ~95% — the gaps below close the rest).
# Expensive reasoning WRITES packets; cheap fresh contexts EXECUTE them. A packet must be
# self-sufficient: an agent with only this packet + the named files can do the job.
# Terminal packets (incl. skipped/blocked) are never deleted — they are the engine's memory.

candidate_id: string            # stable, e.g. "srv-records-aggregate-0007"
created: iso-timestamp
repo_sha: string                # inventory snapshot this packet was derived from
subsystem: string               # e.g. "server/records"; use "repo" for root-level candidates
files: [string]
symbols:                        # named symbols AND/OR structured anchors for anonymous callbacks
  - string                      #   e.g. "buildStreamRollups"
  - {file: string, parent_fn: string, anchor: string, line: int}   # e.g. anonymous .map callback
public_surface: [string]        # any CALLER-VISIBLE element: routes, MCP tools, error codes/params/
                                # messages, response-field enums, docs describing them ([] if none)

# ---- classification (BEFORE work; wrong classification = wrong workflow) ----
behavior_status: contract | likely_intended | provisional | accidental | unknown
                                # refers to the RUNTIME BEHAVIOR in scope; for docs-only repairs this is
                                # the documented behavior's status — the artifact being edited goes in plan
ownership: OWN | RENT | DELETE | FREEZE | QUARANTINE | GENERATED | TEMPORARY
action: preserve_refactor | idealize_rewrite | surface_repair | generate_evidence
      | delete | rent | freeze | quarantine | document | propose_contract_change
proof_class: type_only | exact_move | certified_transform | pure_logic | effectful
           | property_at_risk | judgment_first | liveness_roots | proposal
                                # first-class (drives evidence + judge strength; also embedded in batch_key).
                                # exact_move byte-identity = WHITESPACE-NORMALIZED body hash (a hoist
                                # legitimately changes one indent level).
execution_gate: autonomous | owner_ratify
                                # REQUIRED. `hone run/work` REFUSES owner_ratify packets and packets
                                # missing this field (fail-closed; v2 workflows are authored owner_ratify).

# ---- the case (why this, why now) ----
why_this_matters: string        # semantic defect, validated — not just "metric fired"
plan:                           # WHAT to do (why_this_matters is the why; this is the what)
  transform_class: string       #   e.g. "hoist-to-named-module-fn", "explicit-context-extraction"
  instruction: string           #   the intended change: target name, params/context shape, seam
expected_quality_gain: low | medium | high
owner_attention_reduction: low | medium | high
product_impact: none | low | medium | high
priority:                       # OPTIONAL (added 2026-07-01, additive) — plan's persisted ranking
                                # PRIOR, for ORDERING only. Recalibrated by cost-ledger actuals as
                                # they accumulate; NEVER a quality claim about the code or outcome.
                                # Absent on hand-authored packets — run falls back to enum-derived rank.
  score: number                 #   SPEC ranking-formula value at plan time (higher = sooner)
  computed: iso-timestamp       #   when the score was computed
  inputs:                       #   the continuous inputs behind the score
    mass: int                   #     Σ excess cognitive complexity in the group
    churn: int                  #     commits touching the file in the churn window

# ---- risk (drives evidence + judge tier; scrutiny ∝ cost of silent wrongness) ----
risk:
  blast_radius: local | subsystem | cross-cutting
  reversibility: trivial | branch-revert | hard
  silent_wrongness_cost: low | medium | high   # would a mistake be DETECTED? auth/storage/public = high
  property_at_risk: string | null              # named invariant (e.g. "no field outside grant scope")

# ---- evidence ----
authoring_evidence:             # evidence gathered WHEN WRITING the packet (e.g. delete packets carry
  - {kind: string, detail: string, result: string}   # their liveness-root sweep here: root_type/search/result)
evidence_required:              # execution-time proof obligations — LITERAL runnable commands, not prose
  - rung: string                #   from proof_class ladder, e.g. "direct-test"
    command: string             #   exact invocation incl. env, e.g. "PDPP_TEST_POSTGRES_URL=... node --test test/x.test.js"
    expect: string              #   pass criterion for humans + judge, e.g. "19/19 pass, 0 skipped"
    expect_check:               #   OPTIONAL (added engine-iteration-1, additive) — the MACHINE-checkable
                                #   half of expect; `work` enforces it deterministically, fail-closed.
                                #   Prose expect stays; this removes the "engine trusts prose" gap.
      type: exit_code | stdout_includes | stdout_regex | scope_fn_lt | file_excess_lt | failing_test_named
                                #   exit_code: process exit == value (int)
                                #   stdout_includes / stdout_regex: stdout contains / matches value (string)
                                #   scope_fn_lt: scope-fn JSON found=true && cognitive_before < value (post only)
                                #   file_excess_lt: file-collector JSON found=true && whole-file Σ excess-cc
                                #     < value AND strictly < measured baseline AND no NEW flagged function
                                #     vs baseline (post only — the anti-relocation whole-file target)
                                #   failing_test_named: a TAP/spec FAILURE line (`not ok` / ✖ ✗ ✕ / mocha `1)`)
                                #     must NAME value (substring) — for mutation rungs: the RIGHT test fails,
                                #     not just any test (run-3 t1b-0012: kind-swap exited 0 on setup 409s).
                                #     Post only (generate_evidence guards print a fallback at baseline);
                                #     the rung must still exit 0 overall (seed → run → restore).
      value: int | string
not_allowed: [string]           # e.g. [public-shape-change, new-dependency, behavior-change]

# ---- execution contract ----
maker_tier: cheap | standard | strong
judge_tier: standard | strong   # scales with risk.silent_wrongness_cost, independently of maker_tier
maker_provider: string | null   # filled at execution; MUST differ from judge_provider
judge_provider: string | null
batch_key: string               # workflow × proof_class × subsystem; batching unit
touchset: [string]              # files this WILL modify — lane scheduler serializes overlaps.
                                # Paths are --repo-relative by convention; `work` normalizes every
                                # entry to git-root-relative before comparing against observed
                                # changes (an entry that exists under --repo resolves there;
                                # otherwise it is tried relative to the git root), so a touchset
                                # may legitimately name files outside the --repo subtree.
estimates:                      # ranking inputs (priors; cost ledger recalibrates over time)
  tokens: int
  evidence_cost: low | medium | high
depends_on: [candidate_id]      # packets that must land first
unlocks: [candidate_id]         # packets this enables (evidence-generation packets name their payoff)

# ---- outcome (terminal; the durable knowledge) ----
status: pending | in_progress | landed | reverted | skipped | blocked
resets:                         # OPTIONAL (added engine-iteration-1, additive) — owner reopenings via
                                # `hone reset`; each entry records that a terminal status was deliberately
                                # returned to pending (landed requires --force). Never removed once appended.
  - {at: iso-timestamp, from_status: status-enum, reason: string}
outcome:
  commit: string | null
  skip_reason: string | null    # REQUIRED if skipped — e.g. "T1c: capture crosses txn boundary"
  blocked_on: string | null     # REQUIRED if blocked — e.g. "no oracle: needs differential harness for X"
  judge_verdict: string | null  # verbatim gist
  evidence_receipts: [string]   # commands run + results, pasted not narrated
  tokens_actual: int | null
  lesson: string | null         # anything that should update priors/rules (incl. upstream collector bugs)
